<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oráculo Místico de Diana de Vil</title>
    <link href="https://fonts.googleapis.com/css2?family=Uncial+Antiqua&family=Cinzel:wght@400;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Montserrat', sans-serif;
            background: radial-gradient(ellipse at bottom, #1B0A0A 0%, #090A0F 100%);
            color: #F5E6C8;
            min-height: 100vh;
            overflow-x: hidden;
        }

        #estrellas {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none; z-index: 0;
        }

        .contenedor {
            position: relative; z-index: 1;
            max-width: 1400px; margin: 0 auto;
            padding: 40px 20px; text-align: center;
        }

        h1 {
            font-family: 'Uncial Antiqua', cursive;
            font-size: 3.5rem;
            background: linear-gradient(45deg, #DC143C, #8B0000, #DC143C);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
            text-shadow: 0 0 40px rgba(220, 20, 60, 0.8), 0 0 80px rgba(139, 0, 0, 0.6);
            letter-spacing: 2px;
        }

        .subtitulo {
            font-size: 1.1rem; color: #C9B37C;
            margin-bottom: 40px; font-style: italic;
        }

        #pantalla-inicial, #pantalla-barajando, #pantalla-tirada, #pantalla-resultado { display: none; }
        #pantalla-inicial.active, #pantalla-barajando.active,
        #pantalla-tirada.active, #pantalla-resultado.active {
            display: block; animation: aparecer 0.8s ease;
        }

        @keyframes aparecer {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        input {
            width: 100%; max-width: 600px; padding: 18px 25px;
            font-size: 1.1rem; background: rgba(255, 255, 255, 0.05);
            border: 2px solid #8B0000; border-radius: 50px;
            color: #F5E6C8; backdrop-filter: blur(10px);
            margin-bottom: 25px; transition: all 0.3s;
        }

        input:focus {
            outline: none; border-color: #DC143C;
            box-shadow: 0 0 25px rgba(220, 20, 60, 0.6);
        }

        button {
            padding: 18px 50px; font-size: 1.2rem;
            font-family: 'Cinzel', serif;
            background: linear-gradient(45deg, #8B0000, #DC143C);
            color: #F5E6C8; border: none; border-radius: 50px;
            cursor: pointer; font-weight: 700; transition: all 0.3s;
            box-shadow: 0 5px 25px rgba(220, 20, 60, 0.5);
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 35px rgba(220, 20, 60, 0.8);
        }

        .btn-cofre {
            padding: 18px 25px!important;
            background: #1a1a1a!important;
            border: 2px solid #DC143C!important;
            color: #DC143C!important;
            font-size: 24px!important;
            margin-left: 10px;
            border-radius: 50px;
        }
        .btn-cofre:hover {
            background: #DC143C!important;
            color: #F5E6C8!important;
        }

        .mensaje-mistico {
            font-size: 1.5rem; color: #DC143C;
            margin: 40px 0; animation: pulsar 2s infinite;
            font-family: 'Cinzel', serif;
        }

        @keyframes pulsar {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; text-shadow: 0 0 20px rgba(220, 20, 60, 0.8); }
        }

        .mazo-barajando {
            width: 200px; height: 300px;
            margin: 60px auto; position: relative;
            perspective: 1000px;
        }

        .carta-mazo {
            position: absolute; width: 120px; height: 180px;
            background: linear-gradient(135deg, #2C1010, #4A1C1C);
            border: 3px solid #DC143C; border-radius: 10px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.7);
            display: flex; align-items: center; justify-content: center;
            font-size: 2.5rem;
        }

        .carta-mazo:nth-child(1) { animation: barajar1 1.2s infinite; }
        .carta-mazo:nth-child(2) { animation: barajar2 1.2s infinite 0.1s; }
        .carta-mazo:nth-child(3) { animation: barajar3 1.2s infinite 0.2s; }
        .carta-mazo:nth-child(4) { animation: barajar4 1.2s infinite 0.3s; }
        .carta-mazo:nth-child(5) { animation: barajar5 1.2s infinite 0.4s; }

        @keyframes barajar1 {
            0%, 100% { transform: translateX(0) rotateZ(0deg) translateY(0); z-index: 5; }
            25% { transform: translateX(-60px) rotateZ(-15deg) translateY(-20px); z-index: 1; }
            50% { transform: translateX(0) rotateZ(0deg) translateY(0); z-index: 5; }
            75% { transform: translateX(60px) rotateZ(15deg) translateY(-20px); z-index: 1; }
        }

        @keyframes barajar2 {
            0%, 100% { transform: translateX(-10px) rotateZ(-5deg) translateY(5px); z-index: 4; }
            25% { transform: translateX(-70px) rotateZ(-20deg) translateY(-15px); z-index: 2; }
            50% { transform: translateX(-10px) rotateZ(-5deg) translateY(5px); z-index: 4; }
            75% { transform: translateX(50px) rotateZ(10deg) translateY(-15px); z-index: 2; }
        }

        @keyframes barajar3 {
            0%, 100% { transform: translateX(10px) rotateZ(5deg) translateY(10px); z-index: 3; }
            25% { transform: translateX(-50px) rotateZ(-10deg) translateY(-10px); z-index: 3; }
            50% { transform: translateX(10px) rotateZ(5deg) translateY(10px); z-index: 3; }
            75% { transform: translateX(70px) rotateZ(20deg) translateY(-10px); z-index: 3; }
        }

        @keyframes barajar4 {
            0%, 100% { transform: translateX(-5px) rotateZ(-2deg) translateY(15px); z-index: 2; }
            25% { transform: translateX(-65px) rotateZ(-18deg) translateY(-5px); z-index: 4; }
            50% { transform: translateX(-5px) rotateZ(-2deg) translateY(15px); z-index: 2; }
            75% { transform: translateX(55px) rotateZ(12deg) translateY(-5px); z-index: 4; }
        }

        @keyframes barajar5 {
            0%, 100% { transform: translateX(5px) rotateZ(2deg) translateY(20px); z-index: 1; }
            25% { transform: translateX(-55px) rotateZ(-12deg) translateY(0px); z-index: 5; }
            50% { transform: translateX(5px) rotateZ(2deg) translateY(20px); z-index: 1; }
            75% { transform: translateX(65px) rotateZ(18deg) translateY(0px); z-index: 5; }
        }

        .tapete {
            display: flex; flex-wrap: wrap; justify-content: center;
            gap: 25px; margin: 40px 0; perspective: 1000px;
        }

        .carta {
            width: 160px; height: 280px; position: relative;
            cursor: pointer; transition: all 0.4s;
            transform-style: preserve-3d;
            animation: saltarCarta 0.6s ease backwards;
        }

        .carta:nth-child(1) { animation-delay: 0.1s; }
        .carta:nth-child(2) { animation-delay: 0.2s; }
        .carta:nth-child(3) { animation-delay: 0.3s; }
        .carta:nth-child(4) { animation-delay: 0.4s; }
        .carta:nth-child(5) { animation-delay: 0.5s; }
        .carta:nth-child(6) { animation-delay: 0.6s; }
        .carta:nth-child(7) { animation-delay: 0.7s; }

        @keyframes saltarCarta {
            from {
                opacity: 0;
                transform: translateY(-100px) rotateX(90deg) scale(0.5);
            }
            to {
                opacity: 1;
                transform: translateY(0) rotateX(0deg) scale(1);
            }
        }

        .carta:hover {
            transform: translateY(-15px);
            filter: drop-shadow(0 15px 30px rgba(220, 20, 60, 0.7));
        }

        .carta-frente, .carta-dorso {
            position: absolute; width: 100%; height: 100%;
            backface-visibility: hidden; border-radius: 12px;
            border: 3px solid #DC143C; transition: transform 0.8s;
            background-size: cover; background-position: center;
        }

        .carta-dorso {
            background: linear-gradient(135deg, #2C1010, #4A1C1C);
            display: flex; align-items: center; justify-content: center;
            font-size: 3rem;
        }

        .carta-frente {
            transform: rotateY(180deg);
        }

        .carta.revelada .carta-dorso { transform: rotateY(180deg); }
        .carta.revelada .carta-frente { transform: rotateY(0deg); }

        #interpretacion {
            background: rgba(139, 0, 0, 0.1);
            border: 2px solid #8B0000; border-radius: 20px;
            padding: 40px; margin: 40px auto; max-width: 900px;
            backdrop-filter: blur(10px);
            text-align: left;
            line-height: 1.9; font-size: 1.15rem;
        }

        #interpretacion p { margin-bottom: 20px; }

       .bloque-consejo {
            margin-top: 25px; padding: 20px; border: 2px solid #DC143C;
            background: rgba(220,20,60,0.15); border-radius: 15px;
            font-weight: bold; color: #DC143C;
            box-shadow: 0 0 20px rgba(220,20,60,0.4);
        }
       .bloque-bendicion {
            margin-top: 20px; text-align: center; font-style: italic;
            color: #DC143C; font-size: 16px; font-family: 'Cinzel', serif;
        }

       .humo {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, rgba(0,255,100,0.6) 0%, transparent 70%);
            animation: humo 2s ease-out; pointer-events: none; z-index: 9999; display: none;
        }
        @keyframes humo {
            0% { opacity: 0; transform: scale(0.5); }
            50% { opacity: 1; transform: scale(1.5); }
            100% { opacity: 0; transform: scale(2); }
        }

        #minijuego {
            display: none;
            background: rgba(139, 0, 0, 0.2);
            border: 2px solid #DC143C;
            border-radius: 20px;
            padding: 30px;
            margin: 30px auto;
            max-width: 600px;
        }
       .simbolos {
            display: flex; justify-content: center; gap: 20px;
            margin: 25px 0; font-size: 50px;
        }
       .simbolo-btn {
            cursor: pointer; padding: 15px; border: 2px solid #DC143C;
            border-radius: 12px; transition: 0.3s;
        }
       .simbolo-btn:hover {
            background: rgba(220, 20, 60, 0.3);
            transform: scale(1.1);
        }
    </style>
</head>
<body>
    <canvas id="estrellas"></canvas>
    <div class="humo" id="humo-verde"></div>

    <div class="contenedor">
        <h1>Oráculo Místico de Diana de Vil</h1>
        <p class="subtitulo">Las cartas susurran. El Oráculo interpreta. Tú decides tu destino.</p>

        <div id="pantalla-inicial" class="active">
            <input type="text" id="pregunta" placeholder="Escribe tu pregunta o pedí un consejo al universo..." maxlength="200">
            <br>
            <div style="display: flex; gap: 10px; justify-content: center; flex-wrap: wrap;">
                <button onclick="iniciarTirada()">Consultar al Oráculo</button>
                <button class="btn-cofre" onclick="abrirCofre()" title="Jugar con Diana">🎁</button>
            </div>
        </div>

        <div id="pantalla-barajando">
            <div class="mensaje-mistico" id="mensaje-barajando">Canalizando energías del universo...</div>
            <div class="mazo-barajando">
                <div class="carta-mazo">🔮</div>
                <div class="carta-mazo">🔮</div>
                <div class="carta-mazo">🔮</div>
                <div class="carta-mazo">🔮</div>
                <div class="carta-mazo">🔮</div>
            </div>
        </div>

        <div id="minijuego">
            <h3 style="font-family: 'Cinzel', serif; color: #DC143C; margin-bottom: 20px;">🎁 El Cofre de Diana</h3>
            <p id="mensaje-juego" style="margin: 15px 0;"></p>
            <div class="simbolos" id="secuencia-mostrar"></div>
            <p>Ahora elegí en orden:</p>
            <div class="simbolos" id="simbolos-elegir"></div>
            <div class="simbolos" id="seleccion-usuario"></div>
            <button id="verificar-juego" style="margin-top: 20px;">Abrir Cofre</button>
        </div>

        <div id="pantalla-tirada">
            <div class="tapete" id="tapete"></div>
            <button id="btn-interpretar" onclick="pedirInterpretacion()" style="display:none;">Revelar Visión del Oráculo</button>
        </div>

        <div id="pantalla-resultado">
            <h2 style="font-family: 'Uncial Antiqua', cursive; color: #DC143C; margin-bottom: 30px; font-size: 2.2rem; text-shadow: 0 0 20px rgba(220, 20, 60, 0.8);">Visión del Oráculo</h2>
            <div id="interpretacion"></div>
            <div class="bloque-consejo" id="consejo"></div>
            <div class="bloque-bendicion" id="bendicion"></div>
            <button onclick="nuevaConsulta()" style="margin-top: 30px;">Nueva Consulta</button>
        </div>
    </div>

        const canvas = document.getElementById('estrellas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        const estrellas = Array.from({length: 200}, () => ({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            radio: Math.random() * 2,
            opacidad: Math.random()
        }));

        function animarEstrellas() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            estrellas.forEach(e => {
                ctx.beginPath();
                ctx.arc(e.x, e.y, e.radio, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 255, 255, ${e.opacidad})`;
                ctx.fill();
                e.opacidad += (Math.random() - 0.5) * 0.05;
                e.opacidad = Math.max(0, Math.min(1, e.opacidad));
            });
            requestAnimationFrame(animarEstrellas);
        }
        animarEstrellas();

        function mostrarHumo(callback) {
            const humo = document.getElementById('humo-verde');
            humo.style.display = 'block';
            setTimeout(() => {
                humo.style.display = 'none';
                callback();
            }, 2000);
        }

        async function iniciarTirada() {
            preguntaActual = document.getElementById('pregunta').value.trim();
            if(!preguntaActual) {
                alert('El Oráculo necesita tu pregunta para canalizar las energías');
                return;
            }

            document.getElementById('minijuego').style.display = 'none';

            const mensajes = [
                'Barajando el mazo cósmico...',
                'Las cartas están eligiendo hablar...',
                'El velo del destino se abre...',
                'Los arcanos danzan en el éter...'
            ];
            let msgIndex = 0;
            const intervalMsg = setInterval(() => {
                document.getElementById('mensaje-barajando').textContent = mensajes[msgIndex % mensajes.length];
                msgIndex++;
            }, 1200);

            mostrarHumo(async () => {
                try {
                    const res = await fetch(`${API_URL}/api/consulta`, {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({mensaje: preguntaActual})
                    });
                    const data = await res.json();

                    cartasActuales = data.cartas;
                    respuestaCompleta = data;

                    clearInterval(intervalMsg);
                    setTimeout(() => mostrarTirada(), 1500);

                } catch(e) {
                    clearInterval(intervalMsg);
                    alert('El Oráculo no puede conectar con el servidor.');
                    cambiarPantalla('pantalla-inicial');
                }
            });
        }

        function mostrarTirada() {
            cambiarPantalla('pantalla-tirada');
            cartasReveladas = 0;

            const tapete = document.getElementById('tapete');
            tapete.innerHTML = '';

            cartasActuales.forEach((carta, i) => {
                const div = document.createElement('div');
                div.className = 'carta';
                const imgUrl = IMAGENES_CARTAS[carta] || 'https://via.placeholder.com/160x280/2C1010/DC143C?text=' + encodeURIComponent(carta);
                div.innerHTML = `
                    <div class="carta-dorso">🔮</div>
                    <div class="carta-frente" style="background-image: url('${imgUrl}');">
                        <div style="position: absolute; bottom: 0; left: 0; right: 0; background: linear-gradient(to top, rgba(0,0,0,0.95), transparent); padding: 20px 8px 10px 8px;">
                            <div style="font-size: 1rem; font-weight: 700; color: #DC143C; text-shadow: 2px 2px 4px #000;">${carta}</div>
                        </div>
                    </div>
                `;
                div.onclick = () => revelarCarta(div);
                tapete.appendChild(div);
            });
        }

        function revelarCarta(elemento) {
            if(elemento.classList.contains('revelada')) return;
            elemento.classList.add('revelada');
            cartasReveladas++;
            if(cartasReveladas === cartasActuales.length) {
                document.getElementById('btn-interpretar').style.display = 'inline-block';
            }
        }

        function pedirInterpretacion() {
            cambiarPantalla('pantalla-resultado');
            document.getElementById('interpretacion').innerHTML = `<p>${respuestaCompleta.respuesta}</p>`;
            document.getElementById('consejo').textContent = '⚡ Consejo de Diana: ' + respuestaCompleta.consejo;
            document.getElementById('bendicion').textContent = '✨ ' + respuestaCompleta.bendicion;
        }

        async function abrirCofre() {
            cambiarPantalla('pantalla-barajando');
            document.getElementById('minijuego').style.display = 'block';

            const res = await fetch(`${API_URL}/api/minijuego`, {method: 'POST'});
            const data = await res.json();
            secuenciaCorrecta = data.secuencia;
            tiradaPremio = data.tirada_premio;
            seleccionUsuario = [];

            document.getElementById('mensaje-juego').textContent = data.mensaje;

            const mostrar = document.getElementById('secuencia-mostrar');
            mostrar.innerHTML = '';
            data.secuencia.forEach(s => {
                const span = document.createElement('span');
                span.textContent = s;
                mostrar.appendChild(span);
            });

            setTimeout(() => { mostrar.innerHTML = '❓ ❓ ❓'; }, 3000);

            const elegir = document.getElementById('simbolos-elegir');
            elegir.innerHTML = '';
            ["🔮", "🌙", "⭐", "🗝️", "🕯️", "⚡"].forEach(s => {
                const btn = document.createElement('div');
                btn.className = 'simbolo-btn';
                btn.textContent = s;
                btn.onclick = () => {
                    if (seleccionUsuario.length < 3) {
                        seleccionUsuario.push(s);
                        actualizarSeleccion();
                    }
                };
                elegir.appendChild(btn);
            });
            document.getElementById('seleccion-usuario').innerHTML = '';
        }

        function actualizarSeleccion() {
            document.getElementById('seleccion-usuario').innerHTML =
                seleccionUsuario.map(s => `<span>${s}</span>`).join(' ');
        }

        document.getElementById('verificar-juego').onclick = () => {
            if (JSON.stringify(seleccionUsuario) === JSON.stringify(secuenciaCorrecta)) {
                alert('¡El cofre se abre! Diana te concede una visión del destino...');
                document.getElementById('minijuego').style.display = 'none';

                cartasActuales = tiradaPremio;
                respuestaCompleta = {
                    respuesta: `Según las cartas ${tiradaPremio.join(', ')}, el universo determina que una oportunidad dorada se acerca a tu vida. Estás en el momento justo para actuar.`,
                    consejo: 'Esta semana tomá una decisión que venís postergando. El resultado será favorable si actuás con confianza.',
                    bendicion: 'Que la suerte de Diana camine siempre a tu lado.'
                };

                cambiarPantalla('pantalla-tirada');
                const tapete = document.getElementById('tapete');
                tapete.innerHTML = '';
                cartasActuales.forEach((carta) => {
                    const div = document.createElement('div');
                    div.className = 'carta';
                    const imgUrl = IMAGENES_CARTAS[carta] || 'https://via.placeholder.com/160x280/2C1010/DC143C?text=' + encodeURIComponent(carta);
                    div.innerHTML = `
                        <div class="carta-dorso">🔮</div>
                        <div class="carta-frente" style="background-image: url('${imgUrl}');">
                            <div style="position: absolute; bottom: 0; left: 0; right: 0; background: linear-gradient(to top, rgba(0,0,0,0.95), transparent); padding: 20px 8px 10px 8px;">
                                <div style="font-size: 1rem; font-weight: 700; color: #DC143C; text-shadow: 2px 2px 4px #000;">${carta}</div>
                            </div>
                        </div>
                    `;
                    div.onclick = () => revelarCarta(div);
                    tapete.appendChild(div);
                });
            } else {
                alert('Los símbolos no coinciden... El cofre permanece cerrado. Inténtalo de nuevo.');
                seleccionUsuario = [];
                actualizarSeleccion();
            }
        };

        function nuevaConsulta() {
            document.getElementById('pregunta').value = '';
            document.getElementById('minijuego').style.display = 'none';
            cambiarPantalla('pantalla-inicial');
        }

        function cambiarPantalla(id) {
            document.querySelectorAll('[id^="pantalla-"]').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }
    </script>
</body>
</html>
